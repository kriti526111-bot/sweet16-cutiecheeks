<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sweet 16 Cutiecheeks</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #ffe6f0, #f3e8ff);
  text-align: center;
  padding: 20px;
}

h1 {
  color: #ff4f87;
  margin-bottom: 5px;
}

p {
  color: #444;
}

.card {
  background: white;
  padding: 20px;
  margin: 15px auto;
  max-width: 420px;
  border-radius: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

input {
  padding: 10px;
  width: 75%;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-top: 10px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #ff6ea8;
  color: white;
  margin-top: 10px;
  cursor: pointer;
}

.letter {
  display: none;
  text-align: left;
  margin-top: 15px;
  white-space: pre-wrap;
  background: #fff5fa;
  padding: 15px;
  border-radius: 15px;
}

.confetti {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  display: none;
}
</style>
</head>

<body>

<h1>🎂 Sweet 16 Cutiecheeks 🎂</h1>
<p>Unlock each letter with the correct password 💖</p>

<div id="container"></div>

<canvas id="confetti"></canvas>

<script>
const data = [
{
title:"The Beginning",
passwords:["yaip"],
hint:"My first reply to your text - hey",
message:`It still makes me laugh that our first actual conversation started with you texting "Hey" and me replying with "Yaip".

Everything after that somehow became part of God's plan.`
},

{
title:"The Person You Are",
passwords:["may"],
hint:"Month when you first texted me",
message:`You are calm—the kind of calm that makes everything feel stable.

And honestly, that calmness is my favourite thing about you.`
},

{
title:"The Memories",
passwords:["art","artclub","art club"],
hint:"Same school club",
message:`Late-night talks, arguments, laughs, memories...

I don't think I can ever choose one favourite moment, because it's all of them together.`
},

{
title:"The Impact",
passwords:["birb"],
hint:"First nickname",
message:`You've made life feel more stable, more real, and more warm.

And that means more than I can explain.`
},

{
title:"Things I Never Say Enough",
passwords:["it","informationtechnology"],
hint:"Last board exam subject",
message:`I don't like distance in anything about you.

I just like knowing you're okay.`
},

{
title:"The Future",
passwords:["yes"],
hint:"Will you stay?",
message:`There are still many memories to make.

Happy Birthday 💖

Kitika loves you a lot.

We'll just grow together.`
}
];

const container = document.getElementById("container");

data.forEach((item, i) => {
  container.innerHTML += `
  <div class="card">
    <h2>🎀 ${item.title}</h2>
    <p><b>Hint:</b> ${item.hint}</p>

    <input id="p${i}" placeholder="Enter password"/>
    <br/>
    <button onclick="check(${i})">Unlock</button>

    <div class="letter" id="l${i}">
      ${item.message}
    </div>
  </div>
  `;
});

function check(i){
  let val = document.getElementById("p"+i).value
  .toLowerCase().replace(/\s/g,'');

  if(data[i].passwords.includes(val)){
    document.getElementById("l"+i).style.display="block";

    if(i === 5){
      launchConfetti();
    }

  } else {
    alert("Wrong password 💔");
  }
}

/* SIMPLE CONFETTI */
function launchConfetti(){
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = "block";

  let pieces = Array.from({length: 120}).map(() => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*6+2,
    d: Math.random()*120
  }));

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#ff6ea8";

    pieces.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();

      p.y += Math.sin(p.d);
      p.x += Math.cos(p.d);
    });

    requestAnimationFrame(draw);
  }

  draw();
}
</script>

</body>
</html>
