<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet 16 Cutiecheeks</title>

<style>
body{
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#ffe6f0,#f3e8ff);
text-align:center;
padding:20px;
}

h1{
color:#ff4f87;
}

.card{
background:white;
padding:20px;
margin:15px auto;
max-width:400px;
border-radius:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:70%;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#ff6ea8;
color:white;
margin-top:10px;
}

.letter{
display:none;
text-align:left;
margin-top:15px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>🎂 Sweet 16 Cutiecheeks 🎂</h1>
<p>Unlock each cake with the correct password 💖</p>

<div id="letters"></div>

<script>

const data = [
{
title:"The Beginning",
passwords:["yaip"],
hint:"My first reply to your text",
message:`It still makes me laugh that our first actual conversation started with you texting "Hey" and me replying with the most enthusiastic "Yaip" ever.

Even though we'd already seen each other offline, we never really talked before that. And knowing me, the fact that I even replied is a miracle in itself. 😭

My first impression of you was that you seemed like a chill and carefree guy.

After that, a lot happened. Some things happened on their own, some things definitely took effort, but somehow everything worked out the way it was supposed to.

Looking at where we are now, I'd just call it God's plan.`
},
{
title:"The Person You Are",
passwords:["may"],
hint:"Name of month when you first texted me",
message:`You are calm—the kind of calm that makes everything feel stable and a little less chaotic.

And considering how chaotic I am, that's saying something. 😭

Whenever I'm with you, it's like everything pauses for a second and the hyperactive kid inside me is being told, "Sit down, bacha."

You're funny, smart, understanding, light-hearted, and somehow always manage to stay chill no matter what's going on.

And yes, before I end this envelope, you're pretty kawaii too.`
},
{
title:"The Memories",
passwords:["art","artclub"],
hint:"We had the same club in school",
message:`This envelope was supposed to be about memories, but that's actually unfair because there are way too many of them. 😭

Late-night conversations, random arguments, lunch together, chess games, thumb fights, rainy days, cheek pulling, nicknames, and all the tiny moments that somehow became my favourites.

So instead of choosing a favourite memory, I think I'll choose my favourite thing:

Us.

Hum dono ka bada sa do logon ka group hamesha favourite rahega.`
},
{
title:"The Impact",
passwords:["birb"],
hint:"First nickname I gave you",
message:`I think the biggest impact you've had on my life is that you've made it feel a little more clear and a little more focused.

Whenever something happens, good or bad, you're one of the first people I want to tell.

Life genuinely feels better with you in it.

You've made my world a little steadier, a little clearer, and a lot warmer than it was before.`
},
{
title:"Things I Never Say Enough",
passwords:["it","informationtechnology"],
hint:"Last board exam of which subject?",
message:`There are a lot of things I don't say often enough.

I don't like hearing about you from other people. I want to hear things directly from you.

Maybe that's because you're my person.`
},
{
title:"The Future",
passwords:["yes"],
hint:"Will you stay?",
message:`There are too many problems yet to face together, too many arguments waiting to happen, and too many memories still left to be made.

Wishing you the happiest birthday and only love and success.

A very happy happy birthday birb.

Kitika loves you a lot.

We'll just grow together. 💖`
}
];

const container=document.getElementById("letters");

data.forEach((item,index)=>{
container.innerHTML+=`
<div class="card">
<h2>🎂 Letter ${index+1}</h2>
<h3>${item.title}</h3>
<p><b>Hint:</b> ${item.hint}</p>
<input id="p${index}" placeholder="Enter password">
<br>
<button onclick="check(${index})">Unlock</button>

<div class="letter" id="l${index}">
${item.message}
</div>
</div>
`;
});

function check(i){
let val=document.getElementById("p"+i).value
.toLowerCase()
.replace(/\s/g,'');

if(data[i].passwords.includes(val)){
document.getElementById("l"+i).style.display="block";

if(i===5){
setTimeout(()=>{
alert("🎉 Happy Sweet 16 Cutiecheeks 🎉");
},500);
}
}else{
alert("Wrong password 💔");
}
}

</script>

</body>
</html>
