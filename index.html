<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sweet 16</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sparkles"></div>

  <section class="hero">
    <div class="hero-box">
      <h1>🎂 Sweet 16</h1>
      <h2>Cutiecheeks</h2>
    </div>

    <p class="subtitle">
      Unlock the cakes with the correct password.
    </p>
  </section>

  <section class="cards">

    <div class="card">
      <div class="candle"></div>

      <div class="cake-top">01</div>

      <h3>The Beginning</h3>

      <button class="hint-btn">
        💖 Show hint
      </button>

      <div class="password-box">
        <input type="password" id="pass1" placeholder="Password">
        <button onclick="checkPassword('pass1','birthday','letter1.html')">
          🔒
        </button>
      </div>
    </div>

    <div class="card">
      <div class="candle"></div>

      <div class="cake-top">02</div>

      <h3>The Person You Are</h3>

      <button class="hint-btn">
        💖 Show hint
      </button>

      <div class="password-box">
        <input type="password" id="pass2" placeholder="Password">
        <button onclick="checkPassword('pass2','cute','letter2.html')">
          🔒
        </button>
      </div>
    </div>

  </section>

  <section class="letter-preview">

    <div class="letter-paper">

      <h2>The Beginning</h2>

      <p>
        It still makes me laugh that our first actual conversation
        started with you texting “Hey”.
      </p>

      <p>
        Looking at where we are now, I’d just call it fate.
      </p>

      <button>
        Continue Reading 💌
      </button>

    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
