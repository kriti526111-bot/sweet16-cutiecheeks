<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet 16 Cutiecheeks</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Fredoka:wght@300..700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink-bg: #FFF0F5;
            --pink-card: #FFF9FB;
            --pink-accent: #FFB6C1;
            --pink-dark: #FF69B4;
            --text-color: #5A4A4A;
        }
        body {
            background-color: var(--pink-bg);
            background-image: radial-gradient(rgba(255, 182, 193, 0.3) 15%, transparent 16%);
            background-size: 30px 30px;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .phone-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
            padding: 25px;
            box-sizing: border-box;
            position: relative;
            min-height: 80vh;
        }
        .hidden { display: none !important; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Fredoka', sans-serif; color: var(--pink-dark); font-size: 2.2rem; margin: 5px 0; }
        .subtitle { font-size: 0.9rem; color: #8A7A7A; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .card { background: var(--pink-card); border: 2.5px dashed var(--pink-accent); border-radius: 20px; padding: 15px 10px; text-align: center; position: relative; }
        .card-num { font-family: 'Fredoka', sans-serif; font-size: 1.5rem; color: var(--pink-dark); margin: 0; }
        .card-title { font-size: 0.95rem; font-weight: 700; margin: 5px 0 10px 0; }
        .hint-btn { background: none; border: none; color: var(--pink-dark); font-size: 0.75rem; cursor: pointer; text-decoration: underline; margin-bottom: 8px; display: block; width: 100%; }
        .password-box { display: flex; align-items: center; background: white; border: 1px solid var(--pink-accent); border-radius: 20px; padding: 5px 10px; margin-top: 5px; }
        .password-box input { width: 100%; border: none; outline: none; font-size: 0.8rem; color: var(--text-color); }
        .lock-btn { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0; }
        .letter-screen { animation: fadeIn 0.4s ease-in-out; }
        .back-btn { background: var(--pink-accent); color: white; border: none; padding: 8px 15px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 0.85rem; margin-bottom: 20px; }
        .letter-paper { background: var(--pink-card); border-radius: 20px; padding: 25px; border: 1px solid #FFE4E1; box-shadow: inset 0 0 20px rgba(255, 192, 203, 0.2); line-height: 1.6; }
        .letter-paper h2 { font-family: 'Fredoka', sans-serif; color: var(--pink-dark); text-align: center; margin-top: 0; }
        .letter-paper p { white-space: pre-line; font-size: 0.95rem; }
        .footer { text-align: center; font-size: 0.8rem; color: var(--pink-dark); margin-top: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <!-- MAIN HOME SCREEN -->
        <div id="home-screen">
            <header>
                <div>✨ ✨ ✨</div>
                <h1>Sweet 16</h1>
                <h1 style="font-size: 1.8rem; margin-top:-10px;">Cutiecheeks</h1>
                <p class="subtitle">Unlock the memories with the correct password.</p>
            </header>

            <div class="grid">
                <!-- CARD 1 -->
                <div class="card">
                    <p class="card-num">01</p>
                    <p class="card-title">The Beginning</p>
                    <button class="hint-btn" onclick="alert('Hint: The year we first met!')">Show hint</button>
                    <div class="password-box">
                        <input type="password" id="pass1" placeholder="Password">
                        <button class="lock-btn" onclick="verifyPassword(1, '2022')">🔒</button>
                    </div>
                </div>

                <!-- CARD 2 -->
                <div class="card">
                    <p class="card-num">02</p>
                    <p class="card-title">The Person You Are</p>
                    <button class="hint-btn" onclick="alert('Hint: Your favorite flavor of ice cream!')">Show hint</button>
                    <div class="password-box">
                        <input type="password" id="pass2" placeholder="Password">
                        <button class="lock-btn" onclick="verifyPassword(2, 'vanilla')">🔒</button>
                    </div>
                </div>

                <!-- CARD 3 -->
                <div class="card">
                    <p class="card-num">03</p>
                    <p class="card-title">The Memories</p>
                    <button class="hint-btn" onclick="alert('Hint: The name of our favorite cafe.')">Show hint</button>
                    <div class="password-box">
                        <input type="password" id="pass3" placeholder="Password">
                        <button class="lock-btn" onclick="verifyPassword(3, 'starbucks')">🔒</button>
                    </div>
                </div>

                <!-- CARD 4 -->
                <div class="card">
                    <p class="card-num">04</p>
                    <p class="card-title">The Impact</p>
                    <button class="hint-btn" onclick="alert('Hint: Your pet\'s name.')">Show hint</button>
                    <div class="password-box">
                        <input type="password" id="pass4" placeholder="Password">
                        <button class="lock-btn" onclick="verifyPassword(4, 'buddy')">🔒</button>
                    </div>
                </div>

                <!-- CARD 5 -->
                <div class="card">
                    <p class="card-num">05</p>
                    <p class="card-title">Things I Never Say</p>
                    <button class="hint-btn" onclick="alert('Hint: Word meaning forever (6 letters).')">Show hint</button>
                    <div class="password-box">
                        <input type="password" id="pass5" placeholder="Password">
                        <button class="lock-btn" onclick="verifyPassword(5, 'always')">🔒</button>
                    </div>
                </div>

                <!-- CARD 6 -->
                <div class="card">
                    <p class="card-num">06</p>
                    <p class="card-title">The Future</p>
                    <button class="hint-btn" onclick="alert('Hint: Type \'forever\'')">Show hint</button>
                    <div class="password-box">
                        <input type="password" id="pass6" placeholder="Password">
                        <button class="lock-btn" onclick="verifyPassword(6, 'forever')">🔒</button>
                    </div>
                </div>
            </div>

            <div class="footer">Made with all my love 💖</div>
        </div>

        <!-- DYNAMIC LETTER SCREEN -->
        <div id="letter-screen" class="letter-screen hidden">
            <button class="back-btn" onclick="showHomeScreen()">← Back</button>
            <div class="letter-paper">
                <h2 id="letter-title">Title</h2>
                <p id="letter-body">Content</p>
            </div>
        </div>

    </div>
